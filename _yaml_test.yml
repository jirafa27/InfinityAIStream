x-healthcheck: &default-healthcheck
  test:
    - CMD
    - python
    - -c
    - import urllib.request; urllib.request.urlopen("http://127.0.0.1:8080/health", timeout=3)

services:
  telegram_control:
    environment:
      - TELEGRAM_PROXY=${TELEGRAM_PROXY:-}
      - HTTPS_PROXY=${HTTPS_PROXY:-}
    healthcheck: *default-healthcheck

networks:
  default:
    driver: bridge
