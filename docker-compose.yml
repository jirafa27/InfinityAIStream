name: ${COMPOSE_PROJECT_NAME:-infinity_stream}

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

x-healthcheck: &default-healthcheck
  test:
    - CMD
    - python
    - -c
    - import urllib.request; urllib.request.urlopen("http://127.0.0.1:8080/health", timeout=3)
  interval: 30s
  timeout: 5s
  retries: 3
  start_period: 60s

services:
  redis:
    image: redis:7-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-infinity_stream}-redis
    profiles: ["local-redis"]
    networks:
      default:
        aliases:
          - redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    cpus: "${REDIS_CPUS:-0.25}"
    mem_limit: ${REDIS_MEM_LIMIT:-128m}
    mem_reservation: ${REDIS_MEM_RESERVATION:-64m}
    pids_limit: ${REDIS_PIDS_LIMIT:-100}
    restart: unless-stopped
    stop_grace_period: 10s
    logging: *default-logging
    command: redis-server --maxmemory 96mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3

  chat_reader:
    build: .
    container_name: ${COMPOSE_PROJECT_NAME:-infinity_stream}-bot
    command: python chat/chat_reader_bot.py
    profiles: ["app"]
    working_dir: /app
    volumes:
      - .:/app
    depends_on:
      redis:
        condition: service_started
        required: false
    env_file:
      - .env
    environment:
      - REDIS_HOST=${REDIS_HOST:-redis}
      - PYTHONPATH=/app
    cpus: "${STREAM_BOT_CPUS:-0.50}"
    mem_limit: ${STREAM_BOT_MEM_LIMIT:-512m}
    mem_reservation: ${STREAM_BOT_MEM_RESERVATION:-256m}
    pids_limit: ${STREAM_BOT_PIDS_LIMIT:-100}
    restart: unless-stopped
    stop_grace_period: 30s
    logging: *default-logging
    healthcheck: *default-healthcheck

  podcaster:
    build: .
    container_name: ${COMPOSE_PROJECT_NAME:-infinity_stream}-ai
    command: python podcast_generator_run.py
    profiles: ["app"]
    working_dir: /app
    volumes:
      - .:/app
    depends_on:
      redis:
        condition: service_started
        required: false
    env_file:
      - .env
    environment:
      - REDIS_HOST=${REDIS_HOST:-redis}
      - PYTHONPATH=/app
    cpus: "${STREAM_AI_CPUS:-0.50}"
    mem_limit: ${STREAM_AI_MEM_LIMIT:-512m}
    mem_reservation: ${STREAM_AI_MEM_RESERVATION:-256m}
    pids_limit: ${STREAM_AI_PIDS_LIMIT:-100}
    restart: unless-stopped
    stop_grace_period: 30s
    logging: *default-logging
    healthcheck: *default-healthcheck

  streamer:
    build:
      context: .
      dockerfile: Dockerfile.streamer
    container_name: ${COMPOSE_PROJECT_NAME:-infinity_stream}-tts
    command: python run_streamer.py
    profiles: ["docker-tts"]
    working_dir: /app
    volumes:
      - ./output/tts:/app/output/tts
    depends_on:
      redis:
        condition: service_started
        required: false
    env_file:
      - .env
    environment:
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - PYTHONPATH=/app
      - TTS_OUTPUT_MODE=file
      - TTS_OUTPUT_DIR=/app/output/tts
      - TTS_SPEAKER=${TTS_SPEAKER:-eugene}
      - TTS_SAMPLE_RATE=${TTS_SAMPLE_RATE:-48000}
    cpus: "${STREAM_TTS_CPUS:-1.00}"
    mem_limit: ${STREAM_TTS_MEM_LIMIT:-1536m}
    mem_reservation: ${STREAM_TTS_MEM_RESERVATION:-768m}
    pids_limit: ${STREAM_TTS_PIDS_LIMIT:-200}
    restart: unless-stopped
    stop_grace_period: 30s
    logging: *default-logging
    healthcheck: *default-healthcheck

  telegram_control:
    build:
      context: .
      dockerfile: Dockerfile.control
    container_name: ${COMPOSE_PROJECT_NAME:-infinity_stream}-tg
    command: python run_telegram_control.py
    profiles: ["control"]
    working_dir: /app
    env_file:
      - .env
    environment:
      - REDIS_HOST=redis
      - COMPOSE_PROJECT_NAME=${COMPOSE_PROJECT_NAME:-infinity_stream}
      - TELEGRAM_PROXY=${TELEGRAM_PROXY:-}
      - HTTPS_PROXY=${HTTPS_PROXY:-}
      - PYTHONPATH=/app
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      redis:
        condition: service_started
        required: false
    cpus: "${STREAM_TG_CPUS:-0.25}"
    mem_limit: ${STREAM_TG_MEM_LIMIT:-256m}
    restart: unless-stopped
    stop_grace_period: 15s
    logging: *default-logging

networks:
  default:
    driver: bridge
